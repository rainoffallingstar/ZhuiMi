name: ZhuiMi Daily Literature Update

on:
  schedule:
    # 北京时间早上6点 = UTC 22点 (前一天)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-literature:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Typst
        uses: typst-community/setup-typst@v4

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Verify Go build
        run: go test ./...

      - name: Import PubMed feeds
        env:
          ZHUIMI_STATE_PATH: data/zhuimi/store.db
        run: go run ./cmd/zhuimi feeds import

      - name: Run daily literature update
        id: daily
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ZHUIMI_STATE_PATH: data/zhuimi/store.db
        run: |
          set -euo pipefail
          report_date="$(date +%F)"
          go run ./cmd/zhuimi run daily --pdf
          pdf_path="content/ZhuiMi/${report_date}/index.pdf"
          test -f "$pdf_path"
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
          echo "pdf_path=$pdf_path" >> "$GITHUB_OUTPUT"

      - name: Finalize SQLite store for commit
        env:
          ZHUIMI_STATE_PATH: data/zhuimi/store.db
        run: go run ./cmd/zhuimi db vacuum

      - name: Stage reports and state
        id: changes
        run: |
          git add content/ZhuiMi/ scripts/pubmed_feeds.json data/zhuimi/store.db
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zhuimi-report-${{ steps.daily.outputs.report_date }}
          path: ${{ steps.daily.outputs.pdf_path }}
          if-no-files-found: warn

      - name: Commit reports and state
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "docs: update ZhuiMi daily report and state"
          git push

      - name: Publish daily PDF to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.daily.outputs.report_date }}"
          pdf="${{ steps.daily.outputs.pdf_path }}"
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI not found on runner"
            exit 1
          fi
          if [ ! -f "$pdf" ]; then
            echo "missing pdf: $pdf"
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$pdf" --clobber
          else
            gh release create "$tag" "$pdf" -t "ZhuiMi $tag" -n "ZhuiMi daily PDF report for $tag."
          fi
