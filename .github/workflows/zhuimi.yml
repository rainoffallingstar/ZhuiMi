name: ZhuiMi Daily Literature Update

on:
  schedule:
    # 北京时间早上6点 = UTC 22点 (前一天)
    - cron: "0 22 * * *"
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  update-literature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install feedparser openai pyyaml tqdm

      - name: Extract PubMed feeds from OPML
        run: |
          uv run scripts/extract_pubmed_feeds.py

      - name: Run literature update
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          uv run scripts/zhuimi_update.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/ZhuiMi/ scripts/.zhuimi_analyzed.json content/ZhuiMi/.zhuimi_daily_*.json
          git diff --staged --quiet || git commit -m "docs: update ZhuiMi daily report"
          git push
