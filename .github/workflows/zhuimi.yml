name: ZhuiMi Daily Literature Update

on:
  schedule:
    # 北京时间早上6点 = UTC 22点 (前一天)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-literature:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Typst
        uses: typst-community/setup-typst@v4

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Verify Go build
        run: go test ./...

      - name: Import RSS feeds
        env:
          ZHUIMI_STATE_PATH: data/zhuimi/store.db
        run: go run ./cmd/zhuimi feeds import

      - name: Run daily literature update
        id: daily
        timeout-minutes: 90
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ZHUIMI_STATE_PATH: data/zhuimi/store.db
        run: |
          set -euo pipefail
          ai_enabled="false"
          cmd=(go run ./cmd/zhuimi run daily --pdf)
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            export ZHUIMI_PROCESSORS_ENABLED="generic_digest,aml_score"
            ai_enabled="true"
            echo "AI secrets detected; running scored daily pipeline"
          else
            echo "OPENAI_API_KEY is missing; falling back to raw fetch mode"
            cmd=(go run ./cmd/zhuimi run daily --skip-scoring --pdf)
          fi
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT
          "${cmd[@]}" 2>&1 | tee "$log_file"
          output="$(python3 -c 'import pathlib, sys; lines=[line.strip() for line in pathlib.Path(sys.argv[1]).read_text().splitlines() if line.strip()]; print(lines[-1] if lines else "")' "$log_file")"
          if [ -z "$output" ]; then
            echo "missing JSON output from daily run"
            exit 1
          fi
          echo "daily json: $output"
          export ZHUIMI_DAILY_OUTPUT="$output"
          report_date="$(python3 -c 'import json, os; print(json.loads(os.environ["ZHUIMI_DAILY_OUTPUT"]).get("report_date", ""))')"
          report_written="$(python3 -c 'import json, os; print(str(bool(json.loads(os.environ["ZHUIMI_DAILY_OUTPUT"]).get("report_written", False))).lower())')"
          report_mode="$(python3 -c 'import json, os; print(json.loads(os.environ["ZHUIMI_DAILY_OUTPUT"]).get("mode", ""))')"
          pdf_path=""
          if [ "$report_written" = "true" ]; then
            pdf_path="content/ZhuiMi/${report_date}/index.pdf"
            test -f "$pdf_path"
          fi
          echo "ai_enabled=$ai_enabled" >> "$GITHUB_OUTPUT"
          echo "report_mode=$report_mode" >> "$GITHUB_OUTPUT"
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
          echo "report_written=$report_written" >> "$GITHUB_OUTPUT"
          echo "pdf_path=$pdf_path" >> "$GITHUB_OUTPUT"

      - name: Finalize SQLite store for commit
        env:
          ZHUIMI_STATE_PATH: data/zhuimi/store.db
        run: go run ./cmd/zhuimi db vacuum

      - name: Stage reports and state
        id: changes
        run: |
          git add content/ZhuiMi/ scripts/feeds.json data/zhuimi/store.db
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated PDF artifacts
        if: steps.daily.outputs.report_written == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zhuimi-report-${{ steps.daily.outputs.report_date }}
          path: ${{ steps.daily.outputs.pdf_path }}
          if-no-files-found: warn

      - name: Commit reports and state
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "docs: update ZhuiMi daily report and state"
          git push

      - name: Publish daily PDF to release
        if: steps.daily.outputs.report_written == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.daily.outputs.report_date }}"
          pdf="${{ steps.daily.outputs.pdf_path }}"
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI not found on runner"
            exit 1
          fi
          if [ ! -f "$pdf" ]; then
            echo "missing pdf: $pdf"
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$pdf" --clobber
          else
            gh release create "$tag" "$pdf" -t "ZhuiMi $tag" -n "ZhuiMi daily PDF report for $tag."
          fi
